<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri + React + Typescript</title>
</head>

<body>
  <!-- Native App Startup Splash Screen -->
  <div id="mobivia-splash"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0f172a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease-out, visibility 0.6s ease-out;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div
        style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(14,165,233,0.4);border-radius:50%;overflow:hidden;">
        <img src="/logo.png" alt="Mobivia Logo" style="width:100%;height:100%;object-fit:cover;" />
      </div>
      <h1
        style="color:white;font-weight:800;font-size:32px;font-family:system-ui,sans-serif;margin:0;letter-spacing:-0.5px;">
        Mobivia</h1>
    </div>
    <div style="width:200px;height:4px;background:#1e293b;border-radius:4px;overflow:hidden;position:relative;">
      <div
        style="position:absolute;top:0;left:0;height:100%;width:50%;background:#0ea5e9;border-radius:4px;animation:splash-load 1.5s infinite ease-in-out;">
      </div>
    </div>
    <style>
      @keyframes splash-load {
        0% {
          left: -50%;
          width: 50%;
        }

        50% {
          left: 25%;
          width: 50%;
        }

        100% {
          left: 100%;
          width: 50%;
        }
      }
    </style>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
